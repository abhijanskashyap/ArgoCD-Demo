<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .value {
            font-size: 24px;
            color: #38bdf8;
            margin-top: 10px;
        }

        .status {
            color: #22c55e;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🚀 DevOps GitOps Dashboard</h1>
    <p>Flask + Docker + Kubernetes + ArgoCD</p>
</div>

<div class="cards">

    <div class="card">
        <h3>Application</h3>
        <div class="value">{{ app_name }}</div>
    </div>

    <div class="card">
        <h3>Version</h3>
        <div class="value">{{ version }}</div>
    </div>

    <div class="card">
        <h3>Environment</h3>
        <div class="value">{{ environment }}</div>
    </div>

    <div class="card">
        <h3>Pod Name</h3>
        <div class="value">{{ hostname }}</div>
    </div>

    <div class="card">
        <h3>Status</h3>
        <div class="value status">Healthy</div>
    </div>

</div>

<footer>
    Managed through ArgoCD GitOps Pipeline
</footer>

</body>
</html>
